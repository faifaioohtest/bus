<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- PWA 與 App 相關設定 -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="巴士預報">
  <meta name="theme-color" content="#002244">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">

  <title>智能巴士站牌 + 天氣與時鐘</title>
  <style>
    * { box-sizing: border-box; }

    html { font-size: 85%; }

    body { 
      background-color: #002244; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      display: flex; flex-direction: column; align-items: center;
      margin: 0; min-height: 100vh; padding: 20px;
    }
    
    .top-bar {
      width: 100%; max-width: 1400px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 25px; gap: 15px; 
    }

    .weather-section {
      display: flex; gap: 10px; flex-wrap: wrap; flex: 1;
      justify-content: flex-start; align-items: center;
    }
    
    .weather-badge {
      background: rgba(0, 17, 34, 0.85); padding: 4px 15px;
      border-radius: 10px; border: 2px solid #00ccff; 
      color: #fff; display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.6); backdrop-filter: blur(5px);
    }
    .weather-temp { font-size: 1.5em; font-weight: bold; }
    
    .weather-details {
      display: flex; flex-direction: column; font-size: 0.85em; 
      line-height: 1.3; margin-left: 8px; padding-left: 10px;
      border-left: 1px solid rgba(255,255,255,0.3);
      color: #bbddff;
    }

    .weather-warnings { display: flex; gap: 8px; flex-wrap: wrap; }
    .warn-icon {
      background: rgba(0, 17, 34, 0.85); padding: 6px 12px;
      border-radius: 10px; border: 2px solid #334455;
      font-size: 1.1em; font-weight: bold; color: #fff;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.6); backdrop-filter: blur(5px);
    }

    .main-title { flex: 1; text-align: center; }
    .main-title h1 { margin: 0; font-size: 1.8em; color: #FADB00; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }
    .main-title p { margin: 5px 0 0 0; color: #aaaaaa; font-size: 0.9em; }

    /* 🕒 加入時鐘與重整按鈕的排版 */
    .clock-container { flex: 1; display: flex; justify-content: flex-end; align-items: center; gap: 15px; }
    
    .realtime-clock {
      font-size: 2.2em; font-weight: 900; color: #FADB00; 
      background: rgba(0, 17, 34, 0.85); padding: 10px 25px;
      border-radius: 10px; border: 2px solid #334455;
      box-shadow: 0 4px 10px rgba(0,0,0,0.6); backdrop-filter: blur(5px);
      letter-spacing: 2px; text-align: center;
      display: flex; flex-direction: column; justify-content: center;
    }
    .date-text {
      font-size: 0.4em; color: #dddddd; letter-spacing: 1px;
      font-weight: normal; margin-bottom: 2px;
    }
    
    .status-indicator {
      font-size: 0.35em; margin-top: 6px; text-align: right;
      letter-spacing: 1px; font-weight: normal;
    }
    .status-ok { color: #00ffaa; }
    .status-error { color: #ff5555; }

    /* 🔄 專屬的 Refresh 按鈕樣式 */
    .refresh-btn {
      background: rgba(0, 34, 68, 0.8); border: 2px solid #334455; color: #aaaaaa; 
      border-radius: 50%; width: 48px; height: 48px; cursor: pointer; 
      display: flex; justify-content: center; align-items: center;
      transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      padding: 0; outline: none;
    }
    .refresh-btn:hover { background: #FADB00; color: #001122; border-color: #FADB00; }
    .refresh-btn:active { transform: scale(0.9); }
    /* 按鈕旋轉動畫 */
    .spin svg { animation: spinIcon 1s linear infinite; }
    @keyframes spinIcon { 100% { transform: rotate(360deg); } }

    /* 按鈕分頁樣式 */
    .station-tabs {
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; 
      width: 100%; max-width: 1400px; margin-bottom: 20px;
    }
    .tab-btn {
      background: rgba(0, 34, 68, 0.8); border: 2px solid #334455; color: #aaaaaa; 
      padding: 10px 20px; border-radius: 8px; font-size: 1.2em; font-weight: bold; 
      cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .tab-btn:hover { background: rgba(0, 51, 102, 0.8); color: #ffffff; }
    .tab-btn.active {
      background: #FADB00; color: #001122; border-color: #FADB00; 
      box-shadow: 0 0 15px rgba(250, 219, 0, 0.5);
    }

    .boards-container {
      display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 900px;
    }

    .eta-board { 
      display: none; 
      background: #001122; border: 3px solid #FADB00; border-radius: 12px; 
      padding: 20px 10px 20px 20px; width: 100%; box-shadow: 0 8px 20px rgba(0,0,0,0.5); 
    }
    .eta-board.active { display: block; }
    
  /* 📌 讓站名與重整按鈕釘死在頂部，並加上 70% 透明與毛玻璃特效 */
    .header { 
      display: flex; justify-content: center; align-items: center; gap: 15px;
      border-bottom: 2px solid #334455; padding-bottom: 12px; margin-bottom: 15px; margin-right: 10px; 
      
      /* 吸頂魔法 */
      position: sticky; 
      top: 0; 
      z-index: 100; 
      padding-top: 10px; 
      
      /* 🌟 70% 透明度 (0.7) 的深藍色背景 */
      background-color: rgba(0, 17, 34, 0.2); 
      
      /* 🌟 毛玻璃模糊特效 (讓透上來的字體模糊，保持標題清晰) */
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px); /* 專為 Safari/iOS 支援 */
    }

    .station-name { font-size: 1.7em; color: #FADB00; font-weight: bold; margin: 0; }
    
    //.list-container { max-height: 480px; overflow-y: auto; padding-right: 10px; }
    //.list-container::-webkit-scrollbar { width: 6px; }
    //.list-container::-webkit-scrollbar-track { background: rgba(0, 17, 34, 0.5); border-radius: 4px; }
    //.list-container::-webkit-scrollbar-thumb { background: #334455; border-radius: 4px; }
    //.list-container::-webkit-scrollbar-thumb:hover { background: #FADB00; } 

    .bus-item { display: flex; justify-content: space-between; align-items: center; background: #002244; margin-bottom: 10px; padding: 10px 12px; border-radius: 8px; }
    .bus-info { display: flex; align-items: center; gap: 10px; }
    .route-badge { background: #0066cc; color: #ffffff; font-size: 1.5em; font-weight: 900; padding: 2px 8px; border-radius: 6px; min-width: 55px; text-align: center; }
    .route-red { background: #e60000; color: #ffffff; } 
    
    .dest-text { font-size: 1em; color: #ffffff; }
    .eta-container { text-align: right; }
    .abs-time { font-size: 0.85em; color: #aaaaaa; margin-bottom: 2px; letter-spacing: 1px; }
    .eta-time { font-size: 1.7em; font-weight: bold; }
    
    .no-data { text-align: center; font-size: 1.4em; color: #ff5555; padding: 15px 0; }
    .company-badge { font-size: 0.75em; padding: 1px 4px; border-radius: 3px; font-weight: bold; margin-left: 5px;}
    .badge-ctb { background: #FADB00; color: #001122; }
    .badge-kmb { background: #ff3333; color: #fff; }

    /* 📱 手機版專屬設定：隱藏日期時間、縮小按鈕 */
    @media (max-width: 899px) {
      .top-bar { flex-direction: column; justify-content: center; gap: 15px; }
      .weather-section { justify-content: center; }
      .clock-container { justify-content: center; width: 100%; display: flex; gap: 10px; }
      
      .date-text, .time-text { display: none; }
      
      .realtime-clock { padding: 8px 15px; font-size: 1.2em; flex: 1; }
      .status-indicator { margin-top: 0; text-align: center; font-size: 0.8em; }
      
      .refresh-btn { width: 42px; height: 42px; }

      /* 🌟 新增：在手機版將主標題字體縮小 */
      .main-title h1 { font-size: 1.3em; }
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="weather-section">
      <div id="current-weather"></div>
      <div id="weather-warnings" class="weather-warnings"></div>
    </div>
    
    <div class="main-title">
      <h1>實時巴士到站預報</h1>
      <p>智能出門儀表板</p>
    </div>
    
    <!-- 🌟 在時鐘左邊加入「全局更新」按鈕 -->
    <div class="clock-container">
      <button id="global-refresh-btn" class="refresh-btn" onclick="manualGlobalRefresh()">
        <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
      </button>
      <div id="realtime-clock" class="realtime-clock"></div>
    </div>
  </div>

  <div id="tabs-container" class="station-tabs"></div>
  <div id="boards-container" class="boards-container"></div>

  <script>
    // 🌤️ 天文台實時天氣
    async function fetchCurrentWeather() {
      try {
        const resRhr = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=tc');
        const jsonRhr = await resRhr.json();
        let minTemp = "--", maxTemp = "--";
        try {
            const resFnd = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=fnd&lang=tc');
            const jsonFnd = await resFnd.json();
            if (jsonFnd.weatherForecast && jsonFnd.weatherForecast.length > 0) {
                minTemp = jsonFnd.weatherForecast[0].forecastMintemp.value;
                maxTemp = jsonFnd.weatherForecast[0].forecastMaxtemp.value;
            }
        } catch (e) {}

        const container = document.getElementById('current-weather');
        if (jsonRhr.icon && jsonRhr.icon.length > 0) {
          const iconId = jsonRhr.icon[0];
          const iconUrl = `https://www.hko.gov.hk/images/HKOWxIconOutline/pic${iconId}.png`;
          let tempStr = "--", humidityStr = "--", uvStr = "--";
          if (jsonRhr.temperature && jsonRhr.temperature.data) {
             const obsTemp = jsonRhr.temperature.data.find(d => d.place === '天文台') || jsonRhr.temperature.data[0];
             if (obsTemp) tempStr = obsTemp.value;
          }
          if (jsonRhr.humidity && jsonRhr.humidity.data) {
             const obsHum = jsonRhr.humidity.data.find(d => d.place === '香港天文台') || jsonRhr.humidity.data[0];
             if (obsHum) humidityStr = obsHum.value;
          }
          if (jsonRhr.uvindex && jsonRhr.uvindex.data && jsonRhr.uvindex.data.length > 0) {
             const uvData = jsonRhr.uvindex.data[0];
             uvStr = `${uvData.value} (${uvData.desc})`;
          }
          container.innerHTML = `
            <div class="weather-badge">
              <img src="${iconUrl}" alt="天氣圖示" style="height: 45px; object-fit: contain;">
              <span class="weather-temp">${tempStr}°C</span>
              <div class="weather-details">
                <div>💧 濕度: ${humidityStr}%</div>
                <div>🌡️ ${minTemp}°C - ${maxTemp}°C</div>
                <div>☀️ UV: ${uvStr}</div>
              </div>
            </div>
          `;
        }
      } catch (err) {}
    }
    fetchCurrentWeather();
    setInterval(fetchCurrentWeather, 600000); 

    // ⛈️ 天氣警告
    async function fetchWeatherWarnings() {
      try {
        const res = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=warnsum&lang=tc');
        const json = await res.json();
        const warnContainer = document.getElementById('weather-warnings');
        const warnings = Object.values(json);
        if (warnings.length === 0) { warnContainer.innerHTML = ''; return; }
        warnContainer.innerHTML = '';
        warnings.forEach(warn => {
          let imgFile = '', color = '#ffffff';

          if (warn.name.includes('雷暴')) { imgFile = 'ts.gif'; color = '#ffcc00'; }
          else if (warn.code.includes('WRAINA')) { imgFile = 'raina.gif'; color = '#ffcc00'; }  
          else if (warn.code.includes('WRAINR')) { imgFile = 'rainr.gif'; color = '#ff3333'; }  
          else if (warn.code.includes('WRAINB')) { imgFile = 'rainb.gif'; color = '#aaaaaa'; }  
          else if (warn.name.includes('寒冷')) { imgFile = 'cold.gif'; color = '#00ccff'; }
          else if (warn.name.includes('酷熱')) { imgFile = 'vhot.gif'; color = '#ff3333'; }
          else if (warn.code.includes('WFIREY')) { imgFile = 'firey.gif'; color = '#ffcc00'; }  
          else if (warn.code.includes('WFIRER')) { imgFile = 'firer.gif'; color = '#ff3333'; }
          else if (warn.name.includes('季候風')) { imgFile = 'sms.gif'; color = '#aaaaaa'; }
          else if (warn.name.includes('山泥傾瀉')) { imgFile = 'landslip.gif'; color = '#ffcc00'; }
          else if (warn.name.includes('水浸')) { imgFile = 'ntfl.gif'; color = '#00ccff'; }
          else if (warn.name.includes('霜凍')) { imgFile = 'frost.gif'; color = '#00ccff'; }
          else if (warn.name.includes('一號')) { imgFile = 'tc1.gif'; color = '#ffffff'; }
          else if (warn.name.includes('三號')) { imgFile = 'tc3.gif'; color = '#ffcc00'; }
          else if (warn.name.includes('八號') && warn.name.includes('西北')) { imgFile = 'tc8nw.gif'; color = '#ff3333'; }
          else if (warn.name.includes('八號') && warn.name.includes('西南')) { imgFile = 'tc8sw.gif'; color = '#ff3333'; }
          else if (warn.name.includes('八號') && warn.name.includes('東北')) { imgFile = 'tc8ne.gif'; color = '#ff3333'; }
          else if (warn.name.includes('八號') && warn.name.includes('東南')) { imgFile = 'tc8se.gif'; color = '#ff3333'; }
          else if (warn.name.includes('八號')) { imgFile = 'tc8nw.gif'; color = '#ff3333'; } 
          else if (warn.name.includes('九號')) { imgFile = 'tc9.gif'; color = '#ff3333'; }
          else if (warn.name.includes('十號')) { imgFile = 'tc10.gif'; color = '#ff3333'; }
          
          const itemDiv = document.createElement('div');
          itemDiv.className = 'warn-icon';
          itemDiv.style.borderColor = color; 

          if (imgFile !== '') {
            itemDiv.innerHTML = `<img src="https://www.hko.gov.hk/tc/wxinfo/dailywx/images/${imgFile}" style="height: 28px; object-fit: contain;"> <span style="color: ${color};">${warn.name}</span>`;
          } else {
            itemDiv.innerHTML = `<span style="color: ${color};">${warn.name}</span>`;
          }
          warnContainer.appendChild(itemDiv);
        });
      } catch (err) {}
    }
    fetchWeatherWarnings();
    setInterval(fetchWeatherWarnings, 60000);

    // 🕒 時鐘 (結合隱藏用 class)
    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      const year = now.getFullYear(), month = now.getMonth() + 1, date = now.getDate();
      const days = ['日', '一', '二', '三', '四', '五', '六'];
      
      document.getElementById('realtime-clock').innerHTML = `
        <div class="date-text">${year}年${month}月${date}日 (星期${days[now.getDay()]})</div>
        <div class="time-text">${hours}:${minutes}:${seconds}</div>
        <div id="api-status" class="status-indicator status-ok">🟢 系統正常</div>
      `;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // 🚌 巴士設定 (保留 9號線 的 excludeDest)
    const STATIONS = [
      {
        stationName: "山翠苑 / 東區醫院",
        routes: [
          { route: '8H', type: 'CTB', ctbStopId: '001231' },
          { route: '81', type: 'CTB', ctbStopId: '001231' },
          { route: '81A', type: 'CTB', ctbStopId: '001231' },
          { route: '82', type: 'CTB', ctbStopId: '001231' },
          { route: '118', type: 'JOINT', ctbStopId: '001231', kmbStopId: '0DCC18C3A018C1DA' }
        ]
      },
      {
        stationName: "筲箕灣官立中學",
        routes: [
          { route: '14', type: 'CTB', ctbStopId: '001232' },
          { route: '8H', type: 'CTB', ctbStopId: '001232' },
          { route: '81', type: 'CTB', ctbStopId: '001232' },
          { route: '81A', type: 'CTB', ctbStopId: '001232' },
          { route: '82', type: 'CTB', ctbStopId: '001232' },
          { route: '118', type: 'JOINT', ctbStopId: '001232', kmbStopId: '75767448DA6FA081' }
        ]
      },
      {
        stationName: "筲箕灣巴士總站",
        routes: [
          { route: '9', type: 'CTB', ctbStopId: '001207', excludeDest: '筲箕灣' },
        ]
      },
      {
        stationName: "西灣河地鐵站",
        routes: [
          { route: '14', type: 'CTB', ctbStopId: '001316' },
        ]
      },
      {
        stationName: "紅隧",
        routes: [
          { route: '118', type: 'JOINT', ctbStopId: '001476', kmbStopId: 'C564EDC91AFD7D04' },
          //{ route: '111', type: 'JOINT', ctbStopId: '001475', kmbStopId: '11B2034DDF30617A' },
          //{ route: '116', type: 'JOINT', ctbStopId: '001475', kmbStopId: '11B2034DDF30617A' },
          //{ route: '107', type: 'JOINT', ctbStopId: '001475', kmbStopId: '11B2034DDF30617A' },
          //{ route: '108', type: 'JOINT', ctbStopId: '001475', kmbStopId: '11B2034DDF30617A' },
        ]
      }
    ];

    // 切換看板分頁
    window.switchTab = function(selectedIndex) {
      document.querySelectorAll('.tab-btn').forEach((btn, index) => {
        index === selectedIndex ? btn.classList.add('active') : btn.classList.remove('active');
      });
      document.querySelectorAll('.eta-board').forEach((board, index) => {
        index === selectedIndex ? board.classList.add('active') : board.classList.remove('active');
      });
    };

    function initBoards() {
      const tabsContainer = document.getElementById('tabs-container');
      const container = document.getElementById('boards-container');
      
      STATIONS.forEach((station, index) => {
        const isActive = index === 0 ? 'active' : '';
        tabsContainer.insertAdjacentHTML('beforeend', `
          <button class="tab-btn ${isActive}" onclick="switchTab(${index})">${station.stationName}</button>
        `);

        // 🌟 每個看板 Header 右側加入專屬的 Refresh 按鈕
        container.insertAdjacentHTML('beforeend', `
          <div class="eta-board ${isActive}" id="board-${index}">
            <div class="header">
              <div class="station-name">${station.stationName}</div>
              <button class="refresh-btn" id="refresh-board-${index}" onclick="fetchSingleBoard(${index})">
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
              </button>
            </div>
            <div id="eta-list-${index}" class="list-container"><div class="no-data">正在載入數據...</div></div>
          </div>
        `);
      });
    }

    // 🌟 核心更新邏輯：重構為獨立獲取單一看板，方便按鈕獨立重整
    async function fetchSingleBoard(index) {
      const station = STATIONS[index];
      const listContainer = document.getElementById(`eta-list-${index}`);
      const btn = document.getElementById(`refresh-board-${index}`);
      let hasError = false;
      let allBuses = []; 

      // 按下時加上旋轉動畫
      if (btn) btn.classList.add('spin');

      const promises = station.routes.map(async (config) => {
        try {
          if (config.type === 'CTB' || config.type === 'JOINT') {
            const res = await fetch(`https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/${config.ctbStopId}/${config.route}`);
            if (!res.ok) throw new Error();
            const json = await res.json();
            if (json.data) {
              json.data.filter(b => b.eta && b.eta !== "").forEach(b => {
                if (config.excludeDest && b.dest_tc.includes(config.excludeDest)) return;
                allBuses.push({ route: config.route, company: 'CTB', eta: b.eta, dest: b.dest_tc });
              });
            }
          }
          if (config.type === 'JOINT' && config.kmbStopId) {
            const kmbRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${config.kmbStopId}`);
            if (!kmbRes.ok) throw new Error();
            const kmbJson = await kmbRes.json();
            if (kmbJson.data) {
              kmbJson.data.filter(b => b.route === config.route && b.eta && b.eta !== "").forEach(b => {
                if (config.excludeDest && b.dest_tc.includes(config.excludeDest)) return;
                allBuses.push({ route: config.route, company: 'KMB', eta: b.eta, dest: b.dest_tc });
              });
            }
          }
        } catch (err) { hasError = true; }
      });

      await Promise.all(promises);
      const now = new Date();
      
      allBuses = allBuses.filter(bus => {
        const etaTime = new Date(bus.eta).getTime();
        if (isNaN(etaTime)) return false;
        return Math.floor((etaTime - now.getTime()) / 60000) >= -3; 
      });

      allBuses.sort((a, b) => new Date(a.eta) - new Date(b.eta));

      if (allBuses.length === 0) {
        listContainer.innerHTML = hasError ? '<div class="no-data" style="color:#aaaaaa;">🔴 數據更新失敗</div>' : '<div class="no-data">暫無班次資料</div>';
        if (btn) btn.classList.remove('spin');
        return hasError;
      }

      listContainer.innerHTML = '';
      let routeCount = {}, seenSignatures = new Set(); 

      allBuses.forEach((bus) => {
        let sig = `${bus.route}_${bus.eta}`;
        if (seenSignatures.has(sig)) return; seenSignatures.add(sig);
        if (!routeCount[bus.route]) routeCount[bus.route] = 0; 
        if (routeCount[bus.route] >= 4) return; routeCount[bus.route]++; 

        const etaDate = new Date(bus.eta);
        const diffMins = Math.floor((etaDate - now) / 60000);
        let displayTime = diffMins <= 0 ? "即將到達" : `${diffMins} 分鐘`;
        let timeColor = diffMins <= 0 ? "#ff5555" : "#00ffaa";
        let hours = String(etaDate.getHours()).padStart(2, '0');
        let minutes = String(etaDate.getMinutes()).padStart(2, '0');

        let compBadge = bus.company === 'CTB' ? '<span class="company-badge badge-ctb">城巴</span>' : '<span class="company-badge badge-kmb">九巴</span>';
        let routeClass = (bus.route.length >= 3 && (bus.route.startsWith('1') || bus.route.startsWith('6'))) ? "route-badge route-red" : "route-badge";

        listContainer.insertAdjacentHTML('beforeend', `
          <div class="bus-item">
            <div class="bus-info">
              <div class="${routeClass}">${bus.route}</div>
              <div class="dest-text"><div>往 ${bus.dest}</div><div>${compBadge}</div></div>
            </div>
            <div class="eta-container">
              <div class="abs-time">${hours}:${minutes}</div>
              <div class="eta-time" style="color: ${timeColor};">${displayTime}</div>
            </div>
          </div>
        `);
      });

      // 載入完成移除旋轉動畫
      if (btn) btn.classList.remove('spin');
      return hasError;
    }

    // 更新全部看板
    async function fetchAllStations() {
      let globalError = false;
      const promises = STATIONS.map(async (s, index) => {
        const hasErr = await fetchSingleBoard(index);
        if (hasErr) globalError = true;
      });
      await Promise.all(promises);
      
      const statusDiv = document.getElementById('api-status');
      if (statusDiv) {
        const timeStr = new Date().toLocaleTimeString('zh-HK', { hour12: false });
        statusDiv.className = globalError ? 'status-indicator status-error' : 'status-indicator status-ok';
        statusDiv.innerHTML = globalError ? `🔴 部分數據延遲 (${timeStr})` : `🟢 實時同步中 (${timeStr})`;
      }
    }

    // 🌟 全局手動重整 (天氣 + 全部看板)
    async function manualGlobalRefresh() {
      const btn = document.getElementById('global-refresh-btn');
      if (btn) btn.classList.add('spin');
      
      await Promise.all([
        fetchCurrentWeather(),
        fetchWeatherWarnings(),
        fetchAllStations()
      ]);
      
      if (btn) btn.classList.remove('spin');
    }

    initBoards();
    fetchAllStations();
    setInterval(fetchAllStations, 10000); // 維持每10秒背景自動更新一次

    // 註冊 Service Worker 讓 Android Chrome 辨識為 App
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(()=>{});
      });
    }
  </script>
